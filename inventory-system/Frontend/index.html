<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>ระบบจัดการสินค้า</title>

<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="layout">

<div class="sidebar">

<h2>📦 ระบบสินค้า</h2>

<ul>
<li class="active" onclick="window.location='index.html'">Dashboard</li>
<li onclick="window.location='products.html'">สินค้า</li>
<li onclick="window.location='history.html'">ประวัติ Stock</li>
<li onclick="window.location='report.html'">รายงาน</li>
</ul>

</div>

<div class="main">

<div class="topbar">

<input id="search" placeholder="ค้นหาสินค้า..." onkeyup="searchProduct()">

<div class="user">
👤 <span id="usernameDisplay"></span>
<button onclick="logout()">ออกจากระบบ</button>
</div>

</div>

<div class="cards">

<div class="card blue">
<h3>สินค้าทั้งหมด</h3>
<p id="totalProducts">0</p>
</div>

<div class="card red">
<h3>สินค้าใกล้หมด</h3>
<p id="lowStock">0</p>
</div>

</div>

<div id="lowStockAlert" class="alertBox"></div>

<div class="chartBox">
<h3>กราฟจำนวนสินค้า</h3>
<canvas id="productChart"></canvas>
</div>

</div>

</div>

<script src="js/index.js"></script>

</body>
</html>
