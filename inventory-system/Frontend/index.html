<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>ระบบจัดการสินค้า</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="topbar">

<h1>ระบบจัดการสินค้า</h1>

<div class="notification">
🔔 <span id="notifyCount">0</span>
</div>

</div>

<div id="lowStockAlert" class="alertBox"></div>

<div class="cards">

<div class="card blue">
<h3>จำนวนสินค้าทั้งหมด</h3>
<p id="totalProducts">0</p>
</div>

<div class="card red">
<h3>สินค้าใกล้หมด</h3>
<p id="lowStock">0</p>
</div>

</div>

<h2>เพิ่มสินค้า</h2>

<div class="addBox">

<input id="name" placeholder="ชื่อสินค้า">
<input id="stock" placeholder="จำนวน">
<input id="min" placeholder="แจ้งเตือนขั้นต่ำ">

<button onclick="addProduct()">เพิ่มสินค้า</button>

</div>

<h2>จัดการ Stock</h2>

<button onclick="stockIn()">นำเข้า Stock</button>
<button onclick="stockOut()">นำออก Stock</button>

<h2>รายการสินค้า</h2>

<table>

<thead>

<tr>
<th>ID</th>
<th>ชื่อสินค้า</th>
<th>Stock</th>
<th>ขั้นต่ำ</th>
<th>จัดการ</th>
</tr>

</thead>

<tbody id="productTable"></tbody>

</table>

<h2>ประวัติ Stock</h2>

<table>

<thead>

<tr>
<th>สินค้า</th>
<th>ประเภท</th>
<th>จำนวน</th>
<th>วันที่</th>
</tr>

</thead>

<tbody id="historyTable"></tbody>

</table>

<h2>รายงาน</h2>

<button onclick="dailyReport()">รายงานรายวัน</button>
<button onclick="monthlyReport()">รายงานรายเดือน</button>

<h3 id="report"></h3>

<script src="js/index.js"></script>

</body>

</html>
